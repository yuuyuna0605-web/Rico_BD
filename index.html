<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rico's Birthday Memory Vault</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #3b0a2a, #070707 75%);
      color: white;
      text-align: center;
      overflow-x: hidden;
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding: 35px 20px;
      box-sizing: border-box;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .active { display: flex; }

    .vault-card {
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(255, 95, 162, 0.6);
      padding: 28px;
      border-radius: 24px;
      max-width: 460px;
      width: 90%;
      box-shadow: 0 0 35px rgba(255, 95, 162, 0.35);
      position: relative;
      overflow: hidden;
    }

    h1 {
      color: #ff8fbd;
      letter-spacing: 2px;
    }

    input, button {
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      margin: 10px;
    }

    button {
      background: #ff5fa2;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { background: #ff2f87; }

    .hint {
      font-size: 14px;
      opacity: 0.75;
    }

    .vault-info {
      text-align: left;
      background: rgba(255,255,255,0.08);
      padding: 18px;
      border-radius: 16px;
      margin: 18px 0;
      line-height: 1.8;
    }

    .vault-info span {
      color: #ffb3d1;
      font-weight: bold;
    }

    .locked {
      color: #ff4f8f;
      letter-spacing: 2px;
    }

    .scan-line {
      height: 2px;
      width: 100%;
      background: linear-gradient(90deg, transparent, #ff5fa2, transparent);
      animation: scan 2s infinite;
      margin-bottom: 15px;
    }

    @keyframes scan {
      0% { transform: translateX(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }

    .terminal-box {
      text-align: left;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 18px;
      margin: 20px 0;
      min-height: 135px;
      font-family: monospace;
      color: #ffd1e5;
    }

    .loading-bar {
      width: 100%;
      height: 14px;
      background: rgba(255,255,255,0.15);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 18px;
    }

    #loadingFill {
      width: 0%;
      height: 100%;
      background: #ff5fa2;
      transition: width 0.4s ease;
    }

    .memory-grid {
      display: grid;
      gap: 12px;
      margin-top: 25px;
    }

    .memory-grid button {
      width: 100%;
      background: rgba(255,95,162,0.25);
      border: 1px solid rgba(255,95,162,0.6);
    }

    .unlocked {
      background: rgba(120,255,180,0.25) !important;
      border: 1px solid rgba(120,255,180,0.7) !important;
    }

    .message {
      line-height: 1.8;
      font-size: 17px;
      max-width: 430px;
      white-space: pre-line;
    }

    img {
      width: 90%;
      max-width: 340px;
      border-radius: 22px;
      margin: 15px 0;
      box-shadow: 0 0 25px rgba(255,255,255,0.25);
    }

    .letter-choice {
      width: 54px;
      height: 54px;
      font-size: 22px;
      margin: 6px;
    }

    .name-box {
      font-size: 34px;
      letter-spacing: 8px;
      margin: 20px 0;
      color: #ffd1e5;
    }

    .fire {
      font-size: 54px;
      margin: 20px 0;
      min-height: 70px;
    }

    .blur-photo {
      filter: blur(12px);
      transition: filter 0.4s ease;
    }

    .dark-moment {
      background: #000;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 28px;
      border-radius: 20px;
      line-height: 1.8;
    }

    .heart {
      position: fixed;
      top: -20px;
      color: pink;
      animation: fall 4s linear forwards;
      font-size: 22px;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div id="passwordScreen" class="screen active">
    <div class="vault-card">
      <h1>MEMORY VAULT</h1>
      <div class="scan-line"></div>

      <div class="vault-info">
        <p><span>Archive Owner:</span> Rico</p>
        <p><span>Archive Keeper:</span> Yufan</p>
        <p><span>Status:</span> <strong class="locked">LOCKED</strong></p>
        <p><span>Package:</span> 5 birthday memories detected</p>
      </div>

      <p>Authentication required</p>

      <input id="passwordInput" type="password" placeholder="Enter passcode" />
      <button onclick="checkPassword()">UNLOCK</button>

      <p id="passwordMessage" class="hint"></p>
      <p class="hint">Hint: special number</p>
    </div>
  </div>

  <div id="loadingScreen" class="screen">
    <div class="vault-card">
      <h1>ACCESS GRANTED</h1>

      <div class="terminal-box">
        <p id="line1"></p>
        <p id="line2"></p>
        <p id="line3"></p>
        <p id="line4"></p>
      </div>

      <div class="loading-bar">
        <div id="loadingFill"></div>
      </div>

      <p id="loadingPercent">0%</p>
    </div>
  </div>

  <div id="menuScreen" class="screen">
    <div class="vault-card">
      <h1>MEMORY ARCHIVE</h1>
      <p id="progressText" class="hint">0 / 5 Memories Restored</p>

      <div class="memory-grid">
        <button id="memoryBtn1" onclick="openMemory(1)">Memory #1 — The Beginning 🔒</button>
        <button id="memoryBtn2" onclick="openMemory(2)">Memory #2 — Adventure 🔒</button>
        <button id="memoryBtn3" onclick="openMemory(3)">Memory #3 — Everyday Life 🔒</button>
        <button id="memoryBtn4" onclick="openMemory(4)">Memory #4 — Goodbye For Now 🔒</button>
        <button id="memoryBtn5" onclick="openMemory(5)">Memory #5 — Final Archive 🔒</button>
      </div>
    </div>
  </div>

  <div id="missionScreen" class="screen">
    <div class="vault-card">
      <h1 id="missionTitle">Memory Lock</h1>
      <p id="missionText"></p>
      <div id="missionArea"></div>
      <p id="missionFeedback" class="hint"></p>
      <button onclick="showScreen('menuScreen')">Back to Archive</button>
    </div>
  </div>

  <div id="memoryScreen" class="screen">
    <div class="vault-card">
      <h1 id="memoryTitle">Memory Unlocked</h1>
      <img id="memoryImage" src="" alt="Memory photo" />
      <div class="message" id="memoryMessage"></div>
      <button onclick="showScreen('menuScreen')">Back to Archive</button>
    </div>
  </div>

  <script>
    const PASSWORD = "0103";
    const FINAL_CODE = "8472";

    const unlocked = {
      1: false,
      2: false,
      3: false,
      4: false,
      5: false
    };

    const memories = {
      1: {
        title: "Memory #1 — The Beginning",
        image: "photo1.jpg",
        message:
`This is where everything started.

Back then I had no idea
how important you would become.`
      },
      2: {
        title: "Memory #2 — Adventure",
        image: "photo2.jpg",
        message:
`One of my favorite memories.

No phones.
No distractions.
Just us.`
      },
      3: {
        title: "Memory #3 — Everyday Life",
        image: "photo3.jpg",
        message:
`Not every memory needs to be special.

Some of my favorites
are the ordinary days with you.`
      },
      4: {
        title: "Memory #4 — Goodbye For Now",
        image: "photo4.jpg",
        message:
`This was one of the hardest moments.

I didn't want to let go.`
      },
      5: {
        title: "Memory #5 — Final Archive",
        image: "photo5.jpg",
        message:
`Thank you for choosing me.

Thank you for staying.

Thank you for being my girlfriend.

Happy Birthday Rico.`
      }
    };

    function checkPassword() {
      const input = document.getElementById("passwordInput").value.toLowerCase();
      const message = document.getElementById("passwordMessage");

      if (input === PASSWORD) {
        showScreen("loadingScreen");
        startLoadingSequence();
      } else {
        message.innerText = "Wrong passcode... try again 🤨";
      }
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
    }

    function typeText(elementId, text, speed, callback) {
      const element = document.getElementById(elementId);
      element.innerText = "";
      let i = 0;

      const typing = setInterval(() => {
        element.innerText += text[i];
        i++;

        if (i >= text.length) {
          clearInterval(typing);
          if (callback) callback();
        }
      }, speed);
    }

    function updateLoading(percent) {
      document.getElementById("loadingFill").style.width = percent + "%";
      document.getElementById("loadingPercent").innerText = percent + "%";
    }

    function startLoadingSequence() {
      updateLoading(0);

      typeText("line1", "> Authentication successful...", 45, () => {
        updateLoading(25);
        typeText("line2", "> Opening Rico's Memory Vault...", 45, () => {
          updateLoading(50);
          typeText("line3", "> Searching for birthday memories...", 45, () => {
            updateLoading(78);
            typeText("line4", "> 5 encrypted memories detected.", 45, () => {
              updateLoading(100);
              setTimeout(() => showScreen("menuScreen"), 1200);
            });
          });
        });
      });
    }

    function openMemory(num) {
      document.getElementById("missionFeedback").innerText = "";
      document.getElementById("missionArea").innerHTML = "";

      if (unlocked[num]) {
        showMemory(num);
        return;
      }

      showScreen("missionScreen");

      if (num === 1) missionName();
      if (num === 2) missionCampfire();
      if (num === 3) missionRestore();
      if (num === 4) missionAirport();
      if (num === 5) missionFinalCode();
    }

    function unlockMemory(num) {
      unlocked[num] = true;

      const btn = document.getElementById("memoryBtn" + num);
      const labels = [
        "",
        "Memory #1 — The Beginning ✅",
        "Memory #2 — Adventure ✅",
        "Memory #3 — Everyday Life ✅",
        "Memory #4 — Goodbye For Now ✅",
        "Memory #5 — Final Archive ✅"
      ];

      btn.innerText = labels[num];
      btn.classList.add("unlocked");

      updateProgress();
      showMemory(num);

      if (num === 5) {
        startHearts();
      }
    }

    function updateProgress() {
      const count = Object.values(unlocked).filter(Boolean).length;
      document.getElementById("progressText").innerText =
        count + " / 5 Memories Restored" + (count === 5 ? " — Archive Complete" : "");
    }

    function showMemory(num) {
      document.getElementById("memoryTitle").innerText = memories[num].title;
      document.getElementById("memoryImage").src = memories[num].image;
      document.getElementById("memoryMessage").innerText = memories[num].message;
      showScreen("memoryScreen");
    }

    function missionName() {
      let name = "R_CO";

      document.getElementById("missionTitle").innerText = "Memory Lock #1";
      document.getElementById("missionText").innerText =
        "This memory is incomplete. Restore the name to confirm the owner.";

      document.getElementById("missionArea").innerHTML = `
        <div class="name-box" id="nameBox">${name}</div>
        <button class="letter-choice" onclick="chooseLetter('A')">A</button>
        <button class="letter-choice" onclick="chooseLetter('I')">I</button>
        <button class="letter-choice" onclick="chooseLetter('E')">E</button>
      `;

      window.chooseLetter = function(letter) {
        if (letter === "I") {
          document.getElementById("nameBox").innerText = "RICO";
          document.getElementById("missionFeedback").innerText = "Identity confirmed.";
          setTimeout(() => unlockMemory(1), 800);
        } else {
          document.getElementById("missionFeedback").innerText = "That is not the missing piece.";
        }
      };
    }

    function missionCampfire() {
      let wood = 0;
      const fires = ["", "🔥", "🔥🔥", "🔥🔥🔥", "🔥🔥🔥🔥", "🔥🔥🔥🔥🔥"];

      document.getElementById("missionTitle").innerText = "Memory Lock #2";
      document.getElementById("missionText").innerText =
        "This adventure has gone cold. Restore the campfire.";

      document.getElementById("missionArea").innerHTML = `
        <div class="fire" id="fireBox">🪵</div>
        <button onclick="addWood()">Add wood</button>
        <p id="woodCount">0 / 5</p>
      `;

      window.addWood = function() {
        wood++;
        document.getElementById("fireBox").innerText = fires[wood];
        document.getElementById("woodCount").innerText = wood + " / 5";

        if (wood >= 5) {
          document.getElementById("missionFeedback").innerText = "Campfire restored.";
          setTimeout(() => unlockMemory(2), 800);
        }
      };
    }

    function missionRestore() {
      document.getElementById("missionTitle").innerText = "Memory Lock #3";
      document.getElementById("missionText").innerText =
        "A quiet memory is fading. Restore it slowly.";

      document.getElementById("missionArea").innerHTML = `
        <img id="restoreImage" class="blur-photo" src="photo3.jpg" alt="Fading memory" />
        <input id="restoreSlider" type="range" min="0" max="100" value="0" oninput="restoreMemory()" />
        <p id="restorePercent">0%</p>
      `;

      window.restoreMemory = function() {
        const value = document.getElementById("restoreSlider").value;
        const blur = 12 - value * 0.12;

        document.getElementById("restoreImage").style.filter = "blur(" + blur + "px)";
        document.getElementById("restorePercent").innerText = value + "%";

        if (value == 100) {
          document.getElementById("missionFeedback").innerText = "Memory restored.";
          setTimeout(() => unlockMemory(3), 700);
        }
      };
    }

    function missionAirport() {
      document.getElementById("missionTitle").innerText = "Memory Lock #4";
      document.getElementById("missionText").innerText = "";

      document.getElementById("missionArea").innerHTML = `
        <div class="dark-moment">
          <p id="airportLine">Close your eyes.</p>
          <button id="readyBtn" style="display:none;" onclick="unlockMemory(4)">I'm ready</button>
        </div>
      `;

      setTimeout(() => {
        document.getElementById("airportLine").innerText =
          "Remember this moment.\nThe goodbye.\nThe kiss.\nThe part I didn't want to end.";
        document.getElementById("readyBtn").style.display = "inline-block";
      }, 3000);
    }

    function missionFinalCode() {
      document.getElementById("missionTitle").innerText = "Final Archive";
      document.getElementById("missionText").innerText =
        "Authorization required. Only the Archive Keeper can unlock this memory.";

      document.getElementById("missionArea").innerHTML = `
        <p>Call Yufan and request authorization.</p>
        <p class="hint">Tell him the required words.</p>
        <input id="finalCodeInput" type="password" placeholder="Enter unlock code" />
        <button onclick="checkFinalCode()">Authorize</button>
      `;

      window.checkFinalCode = function() {
        const code = document.getElementById("finalCodeInput").value;

        if (code === FINAL_CODE) {
          document.getElementById("missionFeedback").innerText = "Authorization accepted.";
          setTimeout(() => unlockMemory(5), 800);
        } else {
          document.getElementById("missionFeedback").innerText =
            "Authorization denied. Ask Yufan for the code.";
        }
      };
    }

    function startHearts() {
      for (let i = 0; i < 35; i++) {
        setTimeout(createHeart, i * 120);
      }
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerText = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (18 + Math.random() * 22) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 4000);
    }
  </script>

</body>
</html>
